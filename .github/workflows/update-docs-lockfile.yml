name: Update Docs Lockfile

on:
  pull_request_target:
    paths:
      - 'docs/package.json'

permissions:
  contents: read

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.CLIENT_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - name: Set git config
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com/".insteadOf https://github.com/
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Checkout PR branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false

      # Avoid `cache: 'pnpm'`: this workflow runs under pull_request_target
      # trust, and the pnpm cache key in actions/install-dependencies collides 
      # with main-branch workflows.
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.24.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      - name: Update Docs Lockfile
        working-directory: ./docs/
        run: pnpm install --ignore-workspace --no-frozen-lockfile --ignore-scripts

      - name: Commit and Push
        run: |
          git add docs/pnpm-lock.yaml
          if git diff --cached --quiet; then
            echo "No lockfile changes to commit"
          else
            git commit -m "Update docs lockfile"
            git push
          fi
